<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Africa | Catálogo Pro</title>
    <style>
        :root { --main: #eab308; --bg: #0f172a; --card: #1e293b; }
        body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; padding: 15px; }
        
        /* HEADER & RECHERCHE */
        .header { text-align: center; padding: 10px 0; border-bottom: 1px solid #334155; margin-bottom: 20px; }
        .header h1 { color: var(--main); margin: 0; font-size: 22px; letter-spacing: 2px; }
        
        .search-box { position: sticky; top: 10px; z-index: 10; margin-bottom: 20px; }
        #search { 
            width: 100%; padding: 18px; border-radius: 15px; border: 2px solid #334155; 
            background: #111827; color: white; font-size: 16px; box-sizing: border-box; outline: none;
        }
        #search:focus { border-color: var(--main); }

        /* CARTES */
        .card { background: var(--card); border-radius: 20px; padding: 15px; margin-bottom: 15px; border: 1px solid #334155; }
        .card-top { display: flex; justify-content: space-between; align-items: center; }
        .tag { background: rgba(234, 179, 8, 0.1); color: var(--main); padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: bold; }
        .price { font-size: 20px; font-weight: 800; }
        .name { font-size: 18px; font-weight: bold; margin: 10px 0 5px 0; }
        .desc { color: #94a3b8; font-size: 13px; min-height: 32px; }
        .loc { font-size: 11px; color: #64748b; margin-top: 10px; font-weight: bold; }
        
        .btn-order { 
            width: 100%; background: var(--main); color: #000; border: none; padding: 12px; 
            border-radius: 12px; font-weight: 800; margin-top: 15px; cursor: pointer; font-size: 14px;
        }

        /* MODAL DE PAIEMENT (Le système que tu voulais) */
        .modal { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); 
            z-index: 100; align-items: center; justify-content: center; padding: 20px;
        }
        .modal-content { 
            background: #111827; border: 1px solid #334155; width: 100%; max-width: 350px; 
            padding: 25px; border-radius: 30px; text-align: center;
        }
        .pay-box { background: #1e293b; padding: 12px; border-radius: 15px; margin: 10px 0; border: 1px solid #334155; }
        .pay-label { font-size: 10px; color: #64748b; font-weight: bold; display: block; margin-bottom: 5px; }
        .pay-num { font-family: monospace; font-size: 18px; color: var(--main); font-weight: bold; }
        .btn-confirm { background: #22c55e; color: white; width: 100%; padding: 15px; border-radius: 15px; border: none; font-weight: bold; margin-top: 15px; cursor: pointer; }
        .btn-cancel { background: none; color: #64748b; border: none; margin-top: 15px; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>

    <div class="header"><h1>SMART AFRICA</h1></div>

    <div class="search-box">
        <input type="text" id="search" placeholder="Pesquisar (Ex: Fuga, AC, Matola...)">
    </div>

    <div id="results"></div>

    <div id="paymentModal" class="modal">
        <div class="modal-content">
            <h2 style="margin-top:0">Confirmar Pedido</h2>
            <p style="color:#94a3b8; font-size:14px">Taxa de Conexão: <b id="modalPrice" style="color:white">--</b> MT</p>
            
            <div class="pay-box">
                <span class="pay-label text-red">M-PESA</span>
                <span class="pay-num">85 611 3036</span>
            </div>
            <div class="pay-box">
                <span class="pay-label">E-MOLA</span>
                <span class="pay-num">87 321 3896</span>
            </div>
            
            <button class="btn-confirm" onclick="confirmPayment()">ENVIAR COMPROVATIVO</button>
            <button class="btn-cancel" onclick="closeModal()">CANCELAR</button>
        </div>
    </div>

    <script>
        // BASE DE DONNÉES COMPLÈTE
        const artisans = [
            {id:'E01', cat:'Elétrica', nome:'Sengelec Moçambique', bairro:'Maputo B.O', preco:200, desc:'Quadros e Média Tensão', tags:'luz curto circuito energia'},
            {id:'E11', cat:'Elétrica', nome:'Electricista João', bairro:'Laulane', preco:25, desc:'Reparação de curtos e tomadas', tags:'luz fusivel lampada casa'},
            {id:'F01', cat:'Frio', nome:'Refri-Maputo Lda', bairro:'Alto Maé', preco:75, desc:'AC, Arcas e Geleiras', tags:'geladeira ar condicionado gas'},
            {id:'F02', cat:'Frio', nome:'Mestre Momed AC', bairro:'Matola T3', preco:35, desc:'Reparação de Split AC', tags:'geladeira frio gas'},
            {id:'C01', cat:'Canalizador', nome:'Isarte Construções', bairro:'Maputo', preco:75, desc:'Fugas, Esgotos e Infiltrações', tags:'agua cano picheleiro'},
            {id:'C11', cat:'Canalizador', nome:'Mestre Ricardo', bairro:'Bairro Central', preco:30, desc:'Desentupimentos e torneiras', tags:'agua sanita picheleiro'},
            {id:'M01', cat:'Mecânica', nome:'Auto-Socorro 24h', bairro:'Maputo', preco:200, desc:'Reboque e assistência pesada', tags:'carro motor reboque oleo'},
            {id:'L04', cat:'Limpeza', nome:'Nemchem MZ', bairro:'Matola', preco:250, desc:'Higiene Industrial Certificada', tags:'sofa tapete desinfecção'}
        ];

        let selectedArtisan = null;

        // RECHERCHE SURPUISSANTE
        document.getElementById('search').oninput = function(e) {
            const query = e.target.value.toLowerCase().trim();
            const filtered = artisans.filter(a => {
                const searchStr = `${a.nome} ${a.cat} ${a.bairro} ${a.desc} ${a.tags}`.toLowerCase();
                return searchStr.includes(query);
            });
            render(filtered);
        };

        function render(list) {
            const container = document.getElementById('results');
            container.innerHTML = '';
            list.forEach(a => {
                container.innerHTML += `
                    <div class="card">
                        <div class="card-top">
                            <span class="tag">${a.cat}</span>
                            <span class="price">${a.preco} MT</span>
                        </div>
                        <div class="name">${a.nome}</div>
                        <div class="desc">${a.desc}</div>
                        <div class="loc">📍 ${a.bairro.toUpperCase()}</div>
                        <button class="btn-order" onclick="openModal('${a.id}')">SOLICITAR CONTACTO</button>
                    </div>
                `;
            });
        }

        // LOGIQUE MODAL
        function openModal(id) {
            selectedArtisan = artisans.find(a => a.id === id);
            document.getElementById('modalPrice').innerText = selectedArtisan.preco;
            document.getElementById('paymentModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('paymentModal').style.display = 'none';
        }

        function confirmPayment() {
            const mpesa = "856113036";
            const text = `*PEDIDO SMART AFRICA*\nID: ${selectedArtisan.id}\nServiço: ${selectedArtisan.cat}\nNome: ${selectedArtisan.nome}\nValor: ${selectedArtisan.preco} MT\n\n_Envio o comprovativo para libertar o contacto._`;
            window.open(`https://wa.me/258${mpesa}?text=${encodeURIComponent(text)}`);
            closeModal();
        }

        // INIT
        render(artisans);
    </script>
</body>
</html>
