<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Africa | Mozambique</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen p-5">

    <div class="max-w-md mx-auto">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-yellow-500">Mini Smart Africa</h1>
            <p class="text-gray-400 text-sm">Trouvez des artisans locaux en un clic</p>
        </header>

        <div class="relative mb-6">
            <input type="text" id="search" 
                class="w-full p-4 bg-gray-800 rounded-xl border border-gray-700 focus:border-yellow-500 outline-none transition"
                placeholder="Ex: Frio, Matola, Plombier...">
        </div>

        <div id="results" class="space-y-4">
            </div>
    </div>

    <script>
        // Tes données (À connecter plus tard à Supabase gratuitement)
        const artisans = [
            {cat:'frio', nome:'Refri-Maputo Lda', bairro:'Alto Maé', preco:2, competencia:'PME Spécialisée'},
            {cat:'eletrica', nome:'Sengelec MZ', bairro:'Maputo Cidade', preco:5, competencia:'Expert'},
            {cat:'limpeza', nome:'Clean Force', bairro:'Polana', preco:2, competencia:'PME'}
        ];

        const searchInput = document.getElementById('search');
        const resultsContainer = document.getElementById('results');

        function display(list) {
            resultsContainer.innerHTML = list.length ? '' : '<p class="text-center text-gray-500">Aucun artisan trouvé 😅</p>';
            list.forEach(a => {
                resultsContainer.innerHTML += `
                    <div class="bg-gray-800 p-5 rounded-2xl border-l-4 border-yellow-500 shadow-lg">
                        <div class="flex justify-between items-start">
                            <div>
                                <h3 class="font-bold text-lg">${a.nome}</h3>
                                <p class="text-sm text-gray-400 font-mono">${a.bairro} • ${a.cat.toUpperCase()}</p>
                            </div>
                            <span class="bg-yellow-500/10 text-yellow-500 px-2 py-1 rounded text-xs font-bold">${a.preco} CR</span>
                        </div>
                        <p class="mt-2 text-sm italic text-gray-300">"${a.competencia}"</p>
                        <button onclick="enviarMsg('${a.nome}')" class="w-full mt-4 bg-green-600 hover:bg-green-700 text-white font-bold py-2 rounded-lg transition">
                            Contacter via WhatsApp
                        </button>
                    </div>
                `;
            });
        }

        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = artisans.filter(a => 
                a.nome.toLowerCase().includes(term) || a.cat.toLowerCase().includes(term) || a.bairro.toLowerCase().includes(term)
            );
            display(filtered);
        });

        // Affichage initial
        display(artisans);

        function enviarMsg(nome) {
            const mpesa = "+258856113036";
            const msg = `Bonjour, je souhaite contacter l'artisan : ${nome}.`;
            window.open(`https://wa.me/${mpesa.replace(/\D/g,'')}?text=${encodeURIComponent(msg)}`);
        }
    </script>
</body>
</html>
