<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maputo Services Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #fdcb6e; --emerald: #00b894; --dark: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--dark); color: var(--text); margin: 0; padding-bottom: 100px; overflow-x: hidden; }
        
        /* SPLASH SCREEN (PUB D'OUVERTURE) */
        #splash { position: fixed; inset: 0; background: var(--dark); z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; transition: 0.8s ease-in-out; }
        .m-logo { width: 90px; height: 90px; background: linear-gradient(145deg, #1e293b, #0f172a); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 50px; font-weight: 800; color: var(--emerald); box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); }
        
        .container { padding: 0 20px; max-width: 600px; margin: 0 auto; display: none; }
        
        /* UI ELEMENTS */
        .balance-card { background: linear-gradient(135deg, var(--card), #0f172a); padding: 20px; border-radius: 25px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(0,184,148,0.3); margin: 20px 0; }
        .search-input { width: 100%; padding: 15px; border-radius: 15px; border: 1px solid #334155; background: var(--card); color: white; margin-bottom: 20px; box-sizing: border-box; }
        .cat-nav { display: flex; overflow-x: auto; gap: 10px; padding-bottom: 15px; scrollbar-width: none; }
        .cat-btn { background: var(--card); border: 1px solid #334155; color: white; padding: 10px 18px; border-radius: 50px; white-space: nowrap; cursor: pointer; font-size: 13px; font-weight: 600; }
        .cat-btn.active { background: var(--emerald); border-color: var(--emerald); }
        
        /* CARDS */
        .card { background: var(--card); border-radius: 22px; padding: 18px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .btn-main { width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; margin-top: 15px; transition: 0.2s; }
        .btn-unlock { background: var(--emerald); color: white; }
        .btn-chat { background: #3b82f6; color: white; }

        /* VOUCHER SYSTEM (LE RETOUR) */
        .pay-panel { background: rgba(253, 203, 110, 0.05); padding: 20px; border-radius: 20px; border: 1px dashed var(--gold); margin-top: 30px; text-align: center; }
        .v-input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; margin: 10px 0; text-align: center; font-weight: bold; }

        /* FAB (REGISTRE) */
        .fab { position: fixed; bottom: 25px; right: 20px; background: var(--emerald); color: white; border: none; padding: 15px 20px; border-radius: 30px; font-weight: 800; box-shadow: 0 10px 30px rgba(0,184,148,0.4); z-index: 100; cursor: pointer; }
    </style>
</head>
<body>

    <div id="splash">
        <div class="m-logo">M</div>
        <h1 style="margin:0; font-size: 28px;">MAPUTO SERVICES</h1>
        <p style="opacity: 0.6; font-size: 14px; margin-bottom: 30px;">Frio • Eléctrica • Mecânica • Limpeza</p>
        <button onclick="startApp()" style="background:var(--emerald); color:white; border:none; padding:15px 40px; border-radius:50px; font-weight:800; cursor:pointer;">ENTRAR</button>
    </div>

    <div class="container" id="app">
        <div class="m-logo" style="width:60px; height:60px; font-size:30px; margin: 20px auto;">M</div>
        
        <div class="balance-card">
            <div><small style="opacity:0.6; font-weight:700">MEU SALDO</small><br><b style="font-size:26px" id="c-val">--</b> <small>Créditos</small></div>
            <button onclick="buyReq()" style="background:var(--gold); border:none; padding:10px 15px; border-radius:12px; font-weight:800; cursor:pointer">RECARREGAR</button>
        </div>

        <input type="text" id="src" class="search-input" placeholder="Pesquisar por bairro ou serviço...">

        <div class="cat-nav" id="cat-nav"></div>
        <div id="list"></div>

        <div class="pay-panel">
            <h4 style="color:var(--gold); margin:0">VALIDAR CÓDIGO (VOUCHER)</h4>
            <input type="text" id="v-code" class="v-input" placeholder="CÓDIGO MS-XXXX">
            <button onclick="valCode()" style="background:var(--gold); border:none; width:100%; padding:12px; border-radius:10px; font-weight:800; cursor:pointer">ATIVAR AGORA</button>
        </div>
    </div>

    <button class="fab" onclick="window.open('https://wa.me/258856113036?text=Quero_registar_meu_negocio')"><i class="fas fa-plus"></i> REGISTAR NEGÓCIO</button>

<script>
    const ADMIN_WA = "258856113036";
    
    // --- LES 35 TECHNICIENS (Base pour tes tests) ---
    const technicians = [
        { id:1, n:"Refri-Maputo Lda", c:"Frio", l:"Alto Maé", p:"258842354805" },
        { id:2, n:"Mestre Momed", c:"Frio", l:"Matola T3", p:"258841234567" },
        { id:6, n:"Sengelec MZ", c:"Eléctrica", l:"Baixa", p:"258842242424" },
        { id:11, n:"Isarte Canaliza", c:"Canalizador", l:"Sommerschield", p:"258847778899" },
        { id:16, n:"Auto-Socorro 24h", c:"Mecânica", l:"EN1 / Matola", p:"258844445555" },
        { id:21, n:"Clean Force", c:"Limpeza", l:"Polana", p:"258840001111" },
        { id:26, n:"Reparação TV", c:"Electrónica", l:"Malhangalene", p:"258840008881" },
        { id:31, n:"Chaveiro 24h", c:"Serralheiro", l:"Bairro Central", p:"258840009991" }
        // ... (Ajoute le reste ici selon le même modèle)
    ];

    const categories = ["Todos", "Frio", "Eléctrica", "Canalizador", "Mecânica", "Limpeza", "Electrónica", "Serralheiro"];
    let credits = localStorage.getItem("ms_credits") || 2; 
    let unlocked = JSON.parse(localStorage.getItem("ms_unlocked")) || [];

    function startApp() {
        document.getElementById('splash').style.transform = 'translateY(-100%)';
        document.getElementById('app').style.display = 'block';
    }

    const save = () => {
        document.getElementById("c-val").innerText = credits;
        localStorage.setItem("ms_credits", credits);
        localStorage.setItem("ms_unlocked", JSON.stringify(unlocked));
    };

    const render = (data = technicians) => {
        const list = document.getElementById("list");
        list.innerHTML = "";
        data.forEach(t => {
            const isOk = unlocked.includes(t.id);
            list.innerHTML += `
                <div class="card">
                    <span style="color:var(--emerald); font-size:11px; font-weight:800;">${t.c}</span>
                    <div style="font-size:19px; font-weight:800; margin:5px 0;">${t.n}</div>
                    <div style="font-size:13px; color:#94a3b8;">📍 ${t.l}</div>
                    <button class="btn-main ${isOk ? 'btn-chat' : 'btn-unlock'}" onclick="handleTech(${t.id})">
                        ${isOk ? 'FALAR AGORA' : 'VER CONTACTO (2 Cr)'}
                    </button>
                </div>`;
        });
    };

    const handleTech = (id) => {
        const t = technicians.find(x => x.id === id);
        if(unlocked.includes(id)) { window.open(`https://wa.me/${t.p}`); return; }
        if(credits < 2) return alert("Saldo insuficiente.");
        if(confirm(`Desbloquear ${t.n}?`)) { credits -= 2; unlocked.push(id); save(); render(); window.open(`https://wa.me/${t.p}`); }
    };

    const buyReq = () => window.open(`https://wa.me/${ADMIN_WA}?text=Quero_recarregar_creditos`);
    
    const valCode = () => {
        const code = document.getElementById("v-code").value.trim().toUpperCase();
        const codesMap = { "MS-100": 10, "MS-200": 25, "MS-500": 75 };
        if(codesMap[code]) {
            credits = parseInt(credits) + codesMap[code];
            save(); alert("✅ Créditos Ativados!"); document.getElementById("v-code").value = ""; render();
        } else alert("❌ Código inválido.");
    };

    document.getElementById("src").addEventListener("input", (e) => {
        const term = e.target.value.toLowerCase();
        render(technicians.filter(t => t.n.toLowerCase().includes(term) || t.l.toLowerCase().includes(term) || t.c.toLowerCase().includes(term)));
    });

    const nav = document.getElementById("cat-nav");
    categories.forEach(c => {
        const btn = document.createElement("button");
        btn.className = "cat-btn" + (c === "Todos" ? " active" : "");
        btn.innerText = c;
        btn.onclick = () => {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render(c === "Todos" ? technicians : technicians.filter(t => t.c === c));
        };
        nav.appendChild(btn);
    });

    save(); render();
</script>
</body>
                                                                                                                                                                                   </html>
