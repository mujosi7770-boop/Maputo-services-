        function render(list) {
            container.innerHTML = '';
            if(list.length === 0) {
                container.innerHTML = `<p class="text-center text-slate-500 py-10 italic">Nenhum resultado para esta pesquisa...</p>`;
                return;
            }
            list.forEach(a => {
                container.innerHTML += `
                    <div class="bg-slate-800/40 border border-slate-700/50 p-5 rounded-2xl hover:border-yellow-500/40 transition-all group">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <span class="text-[10px] font-black uppercase text-yellow-500 bg-yellow-500/10 px-2 py-0.5 rounded-md mb-2 inline-block">${a.cat}</span>
                                <h3 class="text-lg font-bold group-hover:text-yellow-400 transition-colors text-white">${a.nome}</h3>
                                <p class="text-slate-400 text-xs mt-1 mb-2">${a.desc}</p>
                                <p class="text-slate-500 text-[10px] flex items-center gap-1 font-black uppercase"><i data-lucide="map-pin" class="w-3 h-3 text-red-500"></i> ${a.bairro}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-xl font-black text-white">${a.preco}<span class="text-[10px] ml-0.5 text-slate-500 italic uppercase">MT</span></p>
                            </div>
                        </div>
                        <button onclick="openModal('${a.id}')" class="w-full py-3 bg-slate-700 hover:bg-yellow-500 hover:text-black rounded-xl font-bold text-sm transition-all flex items-center justify-center gap-2">
                            SOLICITAR CONTACTO <i data-lucide="arrow-right" class="w-4 h-4"></i>
                        </button>
                    </div>
                `;
            });
            lucide.createIcons();
        }

        document.getElementById('search').oninput = (e) => {
            const query = e.target.value.toLowerCase().trim();
            const filtered = artisans.filter(a => {
                return (a.cat.toLowerCase().includes(query) || a.nome.toLowerCase().includes(query) || a.bairro.toLowerCase().includes(query) || a.desc.toLowerCase().includes(query));
            });
            render(filtered);
        };

        function openModal(id) {
            currentArtisan = artisans.find(a => a.id === id);
            document.getElementById('modalPrice').innerText = currentArtisan.preco;
            document.getElementById('paymentModal').classList.add('modal-active');
        }

        function closeModal() {
            document.getElementById('paymentModal').classList.remove('modal-active');
        }

        document.getElementById('btnConfirm').onclick = () => {
            const mpesa = '856113036';
            const msg = `*PEDIDO SMART AFRICA*\n--------------------------\nID: ${currentArtisan.id}\nServiço: ${currentArtisan.cat}\nNome: ${currentArtisan.nome}\nBairro: ${currentArtisan.bairro}\nValor: ${currentArtisan.preco} MT\n--------------------------\nQuero pagar agora para receber o contacto.`;
            window.open(`https://wa.me/258${mpesa}?text=${encodeURIComponent(msg)}`);
            closeModal();
        };
