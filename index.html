<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maputo Services | Confiança Local</title>
    <style>
        :root {
            --primary: #00b894;
            --dark-teal: #083d38;
            --accent: #fdcb6e;
            --bg: #f8f9fa;
            --white: #ffffff;
            --text: #2d3436;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg);
            margin: 0;
            color: var(--text);
            line-height: 1.6;
        }

        .header {
            background: linear-gradient(135deg, var(--dark-teal), #004d40);
            color: white;
            padding: 40px 20px;
            text-align: center;
            border-radius: 0 0 30px 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .header h1 { margin: 0; font-size: 28px; letter-spacing: -1px; }
        .header p { opacity: 0.8; font-size: 14px; margin-top: 5px; }

        .container { padding: 20px; max-width: 600px; margin: 0 auto; }

        .wallet-card {
            background: var(--white);
            padding: 20px;
            border-radius: 20px;
            margin-top: -30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .search-bar {
            width: 100%;
            padding: 18px;
            border: 2px solid transparent;
            border-radius: 15px;
            margin: 20px 0;
            font-size: 16px;
            background: var(--white);
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            box-sizing: border-box;
            transition: 0.3s;
        }

        .search-bar:focus { border-color: var(--primary); outline: none; }

        .card {
            background: var(--white);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }

        .badge-verified {
            background: #d1f7ed;
            color: #00a884;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .card-title { font-weight: 800; font-size: 19px; margin: 10px 0 5px 0; color: var(--dark-teal); }
        .card-meta { color: #636e72; font-size: 14px; display: flex; align-items: center; gap: 5px; }
        .rating { color: var(--accent); font-weight: bold; margin: 10px 0; }

        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            font-size: 15px;
        }

        .btn-main { background: var(--primary); color: white; }
        .btn-main:hover { background: #00a884; }

        /* Modal Design */
        #register-modal {
            display:none; position:fixed; top:0; left:0; width:100%; height:100%; 
            background:rgba(0,0,0,0.7); z-index:1000; backdrop-filter: blur(5px);
        }

        .modal-content {
            background: white; margin: 10% auto; padding: 30px; 
            border-radius: 25px; width: 85%; max-width: 400px;
        }

        .fab {
            position:fixed; bottom:25px; right:25px; 
            background: var(--dark-teal); color:white; border:none;
            padding: 15px 25px; border-radius: 50px; font-weight: bold;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2); cursor:pointer;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>🇲🇿 Maputo Services</h1>
    <p>A elite dos técnicos e profissionais da capital</p>
</div>

<div class="container">
    <div class="wallet-card">
        <div>
            <span style="font-size: 12px; color: #636e72;">OS SEUS CRÉDITOS</span><br>
            <b style="font-size: 28px; color: var(--dark-teal);" id="credits-val">--</b>
        </div>
        <button onclick="buyCredits()" style="background:var(--accent); border:none; padding:10px 15px; border-radius:10px; font-weight:bold; cursor:pointer;">
            Recarregar
        </button>
    </div>

    <input type="text" class="search-bar" id="search" placeholder="O que precisa hoje? (ex: AC, Frio)">

    <div id="container-list"></div>
</div>

<div id="register-modal">
    <div class="modal-content">
        <h2 style="margin-top:0">Registar Serviço</h2>
        <input type="text" id="reg-name" class="search-bar" placeholder="Nome do Negócio" style="background:#f1f2f6">
        <input type="text" id="reg-cat" class="search-bar" placeholder="Categoria (ex: Plombier)" style="background:#f1f2f6">
        <input type="text" id="reg-loc" class="search-bar" placeholder="Localização" style="background:#f1f2f6">
        <input type="number" id="reg-phone" class="search-bar" placeholder="WhatsApp (ex: 25885...)" style="background:#f1f2f6">
        
        <button class="btn btn-main" onclick="sendRegistration()">Enviar Proposta</button>
        <button class="btn" style="background:none; color:#636e72" onclick="closeModal()">Fechar</button>
    </div>
</div>

<button class="fab" onclick="openModal()">+ Adicionar Serviço</button>

<script>
const services = [
    { id: 1, name: "REFRECLIMA", category: "AC & Climatização (Frio)", location: "Av. Ho Chi Min, Maputo", rating: "⭐ 4.8", phone: "258842354805", verified: true },
    { id: 2, name: "Sengelec Lda", category: "Electricidade Geral", location: "Maputo Central", rating: "⭐ 4.9", phone: "258842242424", verified: true },
    { id: 3, name: "Isarte Construções", category: "Canalização (Plombier)", location: "Maputo Cidade", rating: "⭐ 4.8", phone: "258847778899", verified: true },
    { id: 4, name: "Bringues Clean", category: "Serviços de Limpeza", location: "Av. Albert Lithuli", rating: "⭐ 4.9", phone: "258866625701", verified: true },
    { id: 5, name: "Canalizador Luís", category: "Canalização & Fugas", location: "Laulane", rating: "⭐ 4.4", phone: "258876665544", verified: false }
];

let credits = localStorage.getItem("map_credits") || 1;

function updateUI() {
    document.getElementById("credits-val").innerText = credits;
    localStorage.setItem("map_credits", credits);
}

function render(data) {
    const list = document.getElementById("container-list");
    list.innerHTML = "";
    data.forEach(s => {
        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `
            ${s.verified ? '<span class="badge-verified">✓ Verificado</span>' : ''}
            <div class="card-title">${s.name}</div>
            <div class="card-meta">📍 ${s.location} • ${s.category}</div>
            <div class="rating">${s.rating}</div>
            <button class="btn btn-main" onclick="getContact(${s.id})">Ver Contacto (1 Crédito)</button>
        `;
        list.appendChild(div);
    });
}

function getContact(id) {
    if (credits <= 0) {
        alert("Créditos insuficientes. Por favor, recarregue via M-Pesa ou e-Mola.");
        return;
    }
    const s = services.find(x => x.id === id);
    if(confirm(`Usar 1 crédito para contactar ${s.name}?`)) {
        credits--;
        updateUI();
        window.open(`https://wa.me/${s.phone}?text=Olá, vi o seu perfil no Maputo Services.`);
    }
}

function buyCredits() {
    alert("📱 RECARGA DE CRÉDITOS\n-------------------\nEnvia o valor (100MT = 10 Cr.) para:\n\nM-Pesa: 856113036\ne-Mola: 873213896\n\nDepois envia o comprovativo no WhatsApp!");
    window.open("https://wa.me/258856113036?text=Quero recarregar créditos para o Maputo Services");
}

function openModal() { document.getElementById("register-modal").style.display = "block"; }
function closeModal() { document.getElementById("register-modal").style.display = "none"; }

function sendRegistration() {
    const n = document.getElementById("reg-name").value;
    const c = document.getElementById("reg-cat").value;
    const p = document.getElementById("reg-phone").value;
    if(!n || !c || !p) return alert("Preencha os campos!");
    
    const msg = encodeURIComponent(`NOVA INSCRIÇÃO:\nNome: ${n}\nCat: ${c}\nTel: ${p}`);
    window.open(`https://wa.me/258856113036?text=${msg}`);
    closeModal();
}

document.getElementById("search").addEventListener("input", (e) => {
    const term = e.target.value.toLowerCase();
    render(services.filter(s => s.category.toLowerCase().includes(term) || s.name.toLowerCase().includes(term)));
});

updateUI();
render(services);
</script>
</body>
</html>
