<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini Smart Africa - Startup</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #f5f5f5; }
    input { margin: 5px 0; padding: 10px; width: 100%; max-width: 300px; }
    button { padding: 10px 20px; margin-top: 10px; cursor: pointer; }
    .result { border:1px solid #ccc; padding:10px; margin:10px 0; background:#fff; }
  </style>
</head>
<body>

<h2>🔎 Trouver un service</h2>
<input id="cat" placeholder="Catégorie (Frio, Électrica...)" />
<input id="zone" placeholder="Quartier (Matola, Polana...)" />
<input id="exp" placeholder="Compétence (Artisan, PME...)" />

<button onclick="search()">Rechercher</button>

<div id="results"></div>

<button onclick="sendWhatsApp()">📩 Commander sur WhatsApp</button>

<script>
// ==== DONNÉES ====
const data = [
  {categorie:"FRIO", nom:"Refri-Maputo Lda", quartier:"Alto Maé", numero:"+258842354805", expertise:"PME spécialisée"},
  {categorie:"FRIO", nom:"Mestre Momed AC", quartier:"Matola T3", numero:"+258845678901", expertise:"Artisan local"},
  {categorie:"FRIO", nom:"Clima-Moz", quartier:"Polana / Sommerschield", numero:"+258823004567", expertise:"PME reconnue"},
  {categorie:"ELÉCTRICA", nom:"Volt-Maputo", quartier:"Costa do Sol", numero:"+258850009988", expertise:"PME"},
  {categorie:"CANALIZADOR", nom:"Isarte Construções", quartier:"Maputo / Matola", numero:"+258847778899", expertise:"PME"},
  {categorie:"LIMPEZA", nom:"Clean Force Lda", quartier:"Polana", numero:"+258821112233", expertise:"PME"},
  {categorie:"SERRALHEIRO", nom:"Chaveiro Maputo 24h", quartier:"Maputo", numero:"+258821112233", expertise:"Grande entreprise"},
  {categorie:"MECÂNICA", nom:"Auto-Socorro 24h", quartier:"Av. Eduardo Mondlane, Maputo", numero:"+258821112233", expertise:"Grande entreprise"}
];

// ==== PRIX SELON COMPÉTENCE ====
function getPrice(exp) {
  if (exp.includes("Artisan")) return 50;
  if (exp.includes("Grande")) return 100;
  if (exp.includes("PME reconnue")) return 1000;
  if (exp.includes("PME")) return 500;
  return 50;
}

// ==== RECHERCHE ====
function search() {
  const cat = document.getElementById("cat").value.toLowerCase();
  const zone = document.getElementById("zone").value.toLowerCase();
  const exp = document.getElementById("exp").value.toLowerCase();

  const results = data.filter(item =>
    item.categorie.toLowerCase().includes(cat) &&
    item.quartier.toLowerCase().includes(zone) &&
    item.expertise.toLowerCase().includes(exp)
  );

  window.filtered = results; // pour WhatsApp

  let output = "";
  results.forEach(r => {
    output += `
      <div class="result">
        <b>${r.nom}</b><br>
        📍 ${r.quartier}<br>
        🧠 ${r.expertise}<br>
        💰 ${getPrice(r.expertise)} MT
      </div>
    `;
  });

  if(results.length === 0) output = "<p>Aucun résultat trouvé.</p>";

  document.getElementById("results").innerHTML = output;
}

// ==== ENVOI SUR WHATSAPP ====
function sendWhatsApp() {
  if (!window.filtered || window.filtered.length === 0) {
    alert("Fais une recherche d'abord !");
    return;
  }

  let message = "🔎 Nouvelle demande client:\n\n";

  window.filtered.forEach(r => {
    message += `• ${r.nom} (${r.quartier}) - ${r.expertise} - ${getPrice(r.expertise)} MT\n`;
  });

  message += `
-----------------------
💳 Paiement:
M-Pesa: 856113036
e-Mola: 873213896

Envoyez preuve + code unique.
`;

  const phone = "258856113036"; // WhatsApp à toi (Mpesa)
  const url = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
  window.open(url, "_blank");
}

// ==== CODE UNIQUE SIMPLE ====
function generateCode() {
  return "CODE-" + Math.floor(Math.random()*100000);
}
</script>

</body>
</html>
