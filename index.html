<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Africa | Serviços Certificados</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .modal-active { display: flex !important; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="text-slate-200 min-h-screen pb-10">

    <header class="p-5 bg-slate-900/80 backdrop-blur-md border-b border-slate-800 sticky top-0 z-40">
        <div class="max-w-xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-xl font-extrabold text-yellow-500 tracking-tighter">SMART AFRICA</h1>
                <p class="text-[10px] text-slate-500 uppercase font-bold tracking-widest leading-none">Maputo • Matola</p>
            </div>
            <div class="flex items-center gap-2 bg-green-500/10 px-3 py-1 rounded-full border border-green-500/20">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                <span class="text-[10px] font-bold text-green-500 uppercase">Agentes Online</span>
            </div>
        </div>
    </header>

    <main class="max-w-xl mx-auto p-4">
        <div class="relative my-6">
            <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-500"></i>
            <input type="text" id="search" 
                class="w-full pl-12 pr-4 py-4 bg-slate-800/50 border border-slate-700 rounded-2xl focus:ring-2 focus:ring-yellow-500 outline-none transition-all placeholder:text-slate-600 text-white"
                placeholder="Ex: AC, Matola, PME, Canalizador...">
        </div>

        <div id="results" class="space-y-4">
            </div>
    </main>

    <div id="paymentModal" class="fixed inset-0 bg-slate-950/90 z-50 hidden items-center justify-center p-4">
        <div class="bg-slate-900 border border-slate-700 w-full max-w-sm rounded-3xl p-6 shadow-2xl">
            <div class="text-center mb-6">
                <div class="w-16 h-16 bg-yellow-500/10 rounded-full flex items-center justify-center mx-auto mb-4 text-yellow-500">
                    <i data-lucide="shield-check" class="w-8 h-8"></i>
                </div>
                <h2 class="text-xl font-bold text-white">Confirmar Pedido</h2>
                <p class="text-slate-400 text-sm mt-1">Taxa de conexão: <span id="modalPrice" class="text-yellow-500 font-bold">--</span> MT</p>
            </div>

            <div class="space-y-3 mb-6 text-sm">
                <div class="flex items-center justify-between p-3 bg-slate-800 rounded-xl border border-slate-700">
                    <span class="text-slate-400 font-bold">M-Pesa</span>
                    <span class="font-mono font-bold text-yellow-500">85 611 3036</span>
                </div>
                <div class="flex items-center justify-between p-3 bg-slate-800 rounded-xl border border-slate-700">
                    <span class="text-slate-400 font-bold">e-Mola</span>
                    <span class="font-mono font-bold text-orange-500">87 321 3896</span>
                </div>
                <p class="text-[11px] text-slate-500 text-center italic">Envie o valor e clique abaixo para enviar o comprovativo via WhatsApp.</p>
            </div>

            <div class="flex flex-col gap-3">
                <button id="btnConfirm" class="w-full bg-green-600 hover:bg-green-500 text-white font-extrabold py-4 rounded-2xl transition shadow-lg">
                    PAGAR & RECEBER CONTACTO
                </button>
                <button onclick="closeModal()" class="text-slate-500 text-sm font-bold hover:text-white transition">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        // BASE DE DONNÉES COMPLÈTE AVEC PRIX RÉELS
        const artisans = [
            // --- FRIO ❄️ ---
            {id: 'F01', cat:'Frio', nome:'Refri-Maputo Lda', bairro:'Alto Maé', preco:75, desc:'PME especializada em AC e Refrigeração'},
            {id: 'F02', cat:'Frio', nome:'Mestre Momed AC', bairro:'Matola T3', preco:30, desc:'Artisao local - Reparações rápidas de geleiras'},
            {id: 'F03', cat:'Frio', nome:'Clima-Moz', bairro:'Polana / Sommerschield', preco:100, desc:'PME - Instalação de AC e manutenção industrial'},
            {id: 'F06', cat:'Frio', nome:'Frimec SA', bairro:'Matola Rio', preco:250, desc:'Grande empresa - Projectos AVAC e frio industrial'},
            {id: 'F19', cat:'Frio', nome:'PolarTech Lda', bairro:'Av. Eduardo Mondlane', preco:150, desc:'Grande empresa - Assistência técnica certificada'},
            
            // --- ELÉCTRICA ⚡ ---
            {id: 'E01', cat:'Elétrica', nome:'Sengelec Moçambique', bairro:'Maputo Cidade / B.O', preco:200, desc:'Grande empresa - Quadros elétricos e alta tensão'},
            {id: 'E06', cat:'Elétrica', nome:'ElectroShadd', bairro:'Malhampsene, Matola', preco:50, desc:'PME - Especialista em comandos e automação'},
            {id: 'E11', cat:'Elétrica', nome:'Electricista João', bairro:'Laulane / Hulene', preco:20, desc:'Artisao local - Reparações domésticas rápidas'},
            {id: 'E12', cat:'Elétrica', nome:'Dreque Puto Servic', bairro:'Infulene, Matola', preco:20, desc:'Artisao local - Montagem de lâmpadas e tomadas'},

            // --- CANALIZADOR 🚰 ---
            {id: 'C01', cat:'Canalizador', nome:'Isarte Construções', bairro:'Maputo / Matola', preco:75, desc:'PME - Canalização geral, infiltrações e esgotos'},
            {id: 'C03', cat:'Canalizador', nome:'Furos de Água MZ', bairro:'Zimpeto / Marracuene', preco:150, desc:'PME - Especialista em furos e bombas submersíveis'},
            {id: 'C11', cat:'Canalizador', nome:'Mestre Ricardo Picheleiro', bairro:'Bairro Central', preco:30, desc:'Artisao local - Desentupimentos e fugas de água'},

            // --- LIMPEZA 🧹 ---
            {id: 'L01', cat:'Limpeza', nome:'Clean Force Lda', bairro:'Polana', preco:50, desc:'PME - Limpeza profunda pós-obra e escritórios'},
            {id: 'L04', cat:'Limpeza', nome:'Nemchem Moçambique', bairro:'Matola', preco:250, desc:'Grande empresa - Higienização industrial certificada'},
            {id: 'L11', cat:'Limpeza', nome:'Lava-Sofás Maputo', bairro:'Bairro Central', preco:40, desc:'Artisao local - Lavagem de estofos e carpetes'},

            // --- ELECTRÓNICA 📺 ---
            {id: 'T01', cat:'Electrónica', nome:'PC Doctor MZ', bairro:'Maputo', preco:60, desc:'PME - Reparação de computadores e software'},
            {id: 'T12', cat:'Electrónica', nome:'Reparação TV Led', bairro:'Bairro Central', preco:35, desc:'Artisao local - Especialista em ecrãs e TVs'},

            // --- SERRALHEIRO 🔑 ---
            {id: 'S01', cat:'Serralheiro', nome:'Chaveiro Maputo 24h', bairro:'Maputo', preco:120, desc:'Grande empresa - Abertura de cofres e chaves codificadas'},
            {id: 'S13', cat:'Serralheiro', nome:'Chaveiro Langa', bairro:'Rotunda de Khobe', preco:25, desc:'Artisao local - Cópia de chaves e fechaduras'}
        ];

        const container = document.getElementById('results');
        let currentArtisan = null;

        // Fonction pour afficher les cartes
        function render(list) {
            container.innerHTML = '';
            if(list.length === 0) {
                container.innerHTML = `<p class="text-center text-slate-500 py-10">Nenhum resultado encontrado...</p>`;
                return;
            }
            list.forEach(a => {
                container.innerHTML += `
                    <div class="bg-slate-800/40 border border-slate-700/50 p-5 rounded-2xl hover:border-yellow-500/40 transition-all group">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <span class="text-[10px] font-black uppercase tracking-tighter text-yellow-500 bg-yellow-500/10 px-2 py-0.5 rounded-md mb-2 inline-block">${a.cat}</span>
                                <h3 class="text-lg font-bold group-hover:text-yellow-400 transition-colors text-white">${a.nome}</h3>
                                <p class="text-slate-400 text-xs mt-1 mb-2">${a.desc}</p>
                                <p class="text-slate-500 text-[11px] flex items-center gap-1 font-bold uppercase"><i data-lucide="map-pin" class="w-3 h-3 text-red-500"></i> ${a.bairro}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-lg font-black text-white">${a.preco}<span class="text-[10px] ml-0.5 text-slate-500 italic">MT</span></p>
                            </div>
                        </div>
                        <button onclick="openModal('${a.id}')" class="w-full py-3 bg-slate-700 hover:bg-yellow-500 hover:text-black rounded-xl font-bold text-sm transition-all flex items-center justify-center gap-2">
                            SOLICITAR CONTACTO <i data-lucide="arrow-right" class="w-4 h-4"></i>
                        </button>
                    </div>
                `;
            });
            lucide.createIcons();
        }

        // Logique de recherche unifiée (Catégorie, Nom, Quartier, Expertise)
        document.getElementById('search').oninput = (e) => {
            const query = e.target.value.toLowerCase().trim();
            const filtered = artisans.filter(a => {
                const searchString = `${a.cat} ${a.nome} ${a.bairro} ${a.desc}`.toLowerCase();
                return searchString.includes(query);
            });
            render(filtered);
        };

        function openModal(id) {
            currentArtisan = artisans.find(a => a.id === id);
            document.getElementById('modalPrice').innerText = currentArtisan.preco;
            document.getElementById('paymentModal').classList.add('modal-active');
        }

        function closeModal() {
            document.getElementById('paymentModal').classList.remove('modal-active');
        }

        document.getElementById('btnConfirm').onclick = () => {
            const mpesa = '856113036';
            const msg = `*PEDIDO SMART AFRICA*\n--------------------------\nRef: ${currentArtisan.id}\nServiço: ${currentArtisan.cat}\nPrestador: ${currentArtisan.nome}\nTaxa: ${currentArtisan.preco} MT\n--------------------------\nQuero o contacto certificado agora.`;
            window.open(`https://wa.me/258${mpesa}?text=${encodeURIComponent(msg)}`);
            closeModal();
        };

        // Initialisation
        render(artisans);
    </script>
</body>
    </html>
