<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Smart Africa Prototype</title>
<style>
body { font-family: Arial, sans-serif; background:#111; color:#fff; margin:0; padding:20px; }
input, button { padding:10px; margin:5px 0; border-radius:8px; border:none; font-weight:bold; }
input { width:100%; }
button { cursor:pointer; }
.card { background:#222; padding:15px; border-radius:12px; margin-bottom:10px; }
</style>
</head>
<body>

<h1>Mini Smart Africa</h1>
<input type="text" id="search" placeholder="Procure: categoria, bairro, competência...">
<div id="results"></div>

<script>
const artisans = [
  {cat:'frio', nome:'Refri-Maputo Lda', bairro:'Alto Maé', preco:2, competencia:'PME especializada'},
  {cat:'frio', nome:'Mestre Momed', bairro:'Matola T3', preco:2, competencia:'Artisan local'},
  {cat:'eletrica', nome:'Sengelec MZ', bairro:'Maputo Cidade', preco:50, competencia:'Grande entreprise'},
  {cat:'limpeza', nome:'Clean Force', bairro:'Polana', preco:2, competencia:'PME'}
];

const mpesa = '+258856113036';
const emola = '+258873213896';

function normalize(str){ return str.toLowerCase(); }

document.getElementById('search').addEventListener('input',()=>{
  const term = normalize(document.getElementById('search').value);
  const results = artisans.filter(a=>{
    return normalize(a.cat).includes(term) || normalize(a.bairro).includes(term) || normalize(a.competencia).includes(term) || normalize(a.nome).includes(term);
  });
  const container = document.getElementById('results');
  container.innerHTML = '';
  if(results.length===0){ container.innerHTML='<p>Nenhum resultado encontrado 😅</p>'; return; }

  results.forEach(a=>{
    const div = document.createElement('div');
    div.className='card';
    div.innerHTML = `<b>${a.nome}</b> (${a.cat.toUpperCase()})<br>${a.bairro}<br>Competência: ${a.competencia}<br>Preço: ${a.preco} CR <button onclick="enviarMsg('${a.nome}', '${a.bairro}', '${a.competencia}', ${a.preco})">Enviar Pedido WhatsApp</button>`;
    container.appendChild(div);
  });
});

function enviarMsg(nome,bairro,competencia,preco){
  const mensagem = `Olá!\nQuero informações sobre:\n- Nome: ${nome}\n- Bairro: ${bairro}\n- Competência: ${competencia}\n- Preço: ${preco} créditos\n\nFavor transferir o valor para:\n- Mpesa: ${mpesa}\n- Emola: ${emola}\nObrigado!`;
  const url = `https://wa.me/${mpesa.replace(/\D/g,'')}?text=${encodeURIComponent(mensagem)}`;
  window.open(url,'_blank');
}
</script>

</body>
</html>
